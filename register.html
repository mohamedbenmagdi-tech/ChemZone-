<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | ChemZone</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" class="brand">
      <span class="flask">⚗️</span><span>ChemZone</span>
    </a>
    <h2>إنشاء حساب جديد</h2>
    <p class="sub">انضم مجانًا وابدأ رحلتك في إتقان الكيمياء</p>

    <div class="form-error" id="regError">من فضلك املأ كل الحقول المطلوبة</div>

    <form id="regForm" onsubmit="return handleRegister(event)">
      <div class="field">
        <label>الاسم بالكامل</label>
        <input type="text" id="name" placeholder="اسمك بالكامل" required>
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com" required>
      </div>
      <div class="field">
        <label>رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="01xxxxxxxxx" required>
      </div>
      <div class="field">
        <label>الصف الدراسي</label>
        <select id="grade" required>
          <option value="">اختر الصف الدراسي</option>
          <option>أولى ثانوي</option>
          <option>ثانية ثانوي</option>
          <option>ثالثة ثانوي</option>
          <option>البكالوريا</option>
        </select>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">إنشاء الحساب &lt;</button>
    </form>

    <p class="auth-foot">عندك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
  </div>
</div>

<script>
function handleRegister(e){
  e.preventDefault();
  var name = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var grade = document.getElementById('grade').value.trim();
  var pass = document.getElementById('password').value.trim();
  var err = document.getElementById('regError');
  if(!name || !email || !phone || !grade || !pass){
    err.style.display = 'block';
    return false;
  }
  // Demo mode: no real backend — just go to the dashboard.
  window.location.href = 'dashboard.html';
  return false;
}
</script>
</body>
</html>
