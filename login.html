<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | ChemZone</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" class="brand">
      <span class="flask">⚗️</span><span>ChemZone</span>
    </a>
    <h2>تسجيل الدخول</h2>
    <p class="sub">أهلاً بعودتك، سجّل دخولك للمتابعة من حيث توقفت</p>

    <div class="form-error" id="loginError">من فضلك أدخل البريد الإلكتروني وكلمة المرور</div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com" required>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">دخول &lt;</button>
    </form>

    <p class="auth-foot">مش عندك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
  </div>
</div>

<script>
function handleLogin(e){
  e.preventDefault();
  var email = document.getElementById('email').value.trim();
  var pass = document.getElementById('password').value.trim();
  var err = document.getElementById('loginError');
  if(!email || !pass){
    err.style.display = 'block';
    return false;
  }
  // Demo mode: no real backend — just go to the dashboard.
  window.location.href = 'dashboard.html';
  return false;
}
</script>
</body>
</html>
